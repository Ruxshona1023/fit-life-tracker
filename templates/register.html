{% extends "layout.html" %}

{% block content %}
<div class="flex justify-center items-center min-h-[70vh]">
    <div class="glass p-10 rounded-3xl w-full max-w-md">
        <h2 class="text-3xl font-bold mb-8 text-center">Ro'yxatdan O'tish</h2>
        <form action="/register" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Foydalanuvchi nomi</label>
                <input type="text" name="username" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl focus:outline-none focus:border-blue-500" placeholder="Username">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-2">Email</label>
                <input type="email" name="email" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl focus:outline-none focus:border-blue-500" placeholder="email@example.com">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-2">Parol</label>
                <input type="password" name="password" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl focus:outline-none focus:border-blue-500" placeholder="********">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-2xl font-bold text-lg transition shadow-lg shadow-green-500/20">Ro'yxatdan o'tish</button>
        </form>
        <p class="mt-6 text-center text-gray-500">
            Akkountingiz bormi? <a href="/login" class="text-blue-400 hover:underline">Kirish</a>
        </p>
    </div>
</div>
{% endblock %}
